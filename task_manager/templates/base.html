<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Менеджер задач">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <title>{% block title %}Менеджер задач{% endblock %}</title>
    </head>

    <body class="min-vh-100 d-flex flex-column">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Менеджер задач</a>
                <div class="collapse navbar-collapse" id="navbarsExample07">
                    {% with request.resolver_match.url_name as url_name %}
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                            <li class="nav-item"><a class="nav-link {% if url_name == 'users' %}active{% endif %}" href="#">Пользователи</a></li>
                        </ul>
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                            <li class="nav-item"><a class="nav-link {% if url_name == 'login' %}active{% endif %}" href="#">Вход</a></li>
                            <li class="nav-item"><a class="nav-link {% if url_name == 'signup' %}active{% endif %}" href="#">Регистрация</a></li>
                        </ul>
                    {% endwith %}
                </div>
            </div>
        </nav>

        <main class="flex-grow-1">
            <div class="container-lg mt-3">
                {% block content %}{% endblock %}
            </div>
        </main>

        <footer class="border-top py-3 mt-5 flex-shrink-0">
            <div class="container-lg">
                <div class="text-center">
                    <a href="https://github.com/buna-p/python-project-52/tree/main" target="_blank">GitHub</a>
                </div>
            </div>
        </footer>
    </body>
</html>
