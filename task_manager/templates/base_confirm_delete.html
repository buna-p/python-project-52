{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1 class="my-4 text-center">{% block delete_title %}{% endblock %}</h1>
        <p>{% block delete_message %}{% endblock %}</p>
        <form method="post">
            {% csrf_token %}
            <input type="submit" class="btn btn-danger" value="Да, удалить">
            <a href="{% block cancel_url %}#{% endblock %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
